name: Bug report
description: Report a problem with the Auralog Godot SDK.
title: "fix: "
labels: ["bug"]
body:
  - type: input
    id: sdk-version
    attributes:
      label: SDK version
    validations:
      required: true
  - type: input
    id: godot-version
    attributes:
      label: Godot version
    validations:
      required: true
  - type: input
    id: platform
    attributes:
      label: Platform/export target
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
